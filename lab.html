<!DOCTYPE html>
<html>
<head>
    <title>Lab Upload</title>

    <style>
        body { margin: 0; font-family: Arial; display: flex; }

        .sidebar {
            width: 200px;
            background: #c6e2ff;
            height: 100vh;
            padding-top: 20px;
            position: fixed;
        }

        .sidebar a {
            display: block;
            color: black;
            padding: 15px;
            text-decoration: none;
        }

        .sidebar a:hover { background: #575757; }

        .content {
            margin-left: 200px;
            padding: 20px;
            width: 100%;
            background: beige;
            min-height: 100vh;
        }

        .card {
            background: lavender;
            padding: 15px;
            border-radius: 10px;
            width: 300px;
        }

        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            background: #333;
            color: white;
            border: none;
            cursor: pointer;
        }

        .delete-btn {
            background: red;
        }

        .preview-img {
            width: 100%;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <a href="index.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="quiz.html">Quiz</a>
    <a href="lab.html">Lab</a>
    <a href="exam.html">Exam</a>
</div>

<div class="content">
    <h1>Lab Upload</h1>

    <div class="card">
        <form onsubmit="submitForm(event)">
            
            <input type="text" id="title" placeholder="Title" required>

            <input type="file" id="fileInput"
                   accept="image/*,.pdf,.doc,.docx,.zip,.html"
                   onchange="previewFile(event)">

            <img id="preview" class="preview-img">

            <button type="submit">Submit</button>
        </form>
    </div>

    <h2>Uploaded Labs</h2>
    <div id="uploads"></div>
</div>

<script>
// preview file
function previewFile(event) {
    const file = event.target.files[0];
    const preview = document.getElementById("preview");

    if (!file) return;

    if (file.type.startsWith("image/")) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
    } else {
        preview.style.display = "none";
        alert("Selected file: " + file.name);
    }
}

// submit form
function submitForm(event) {
    event.preventDefault();

    const title = document.getElementById("title").value;
    const file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("Please upload a file!");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e) {
        const fileData = e.target.result;

        let uploads = JSON.parse(localStorage.getItem("labUploads")) || [];

        uploads.push({
            title: title,
            file: fileData,
            type: file.type,
            name: file.name
        });

        localStorage.setItem("labUploads", JSON.stringify(uploads));

        alert("Lab submitted!");

        // clear form (simple way)
        document.getElementById("title").value = "";
        document.getElementById("fileInput").value = "";
        document.getElementById("preview").style.display = "none";

        displayUploads();
    };

    reader.readAsDataURL(file);
}

// display uploads
function displayUploads() {
    const container = document.getElementById("uploads");
    const uploads = JSON.parse(localStorage.getItem("labUploads")) || [];

    container.innerHTML = "";

    uploads.forEach((item, index) => {
        let content = "";

        if (item.type.startsWith("image/")) {
            content = `<img src="${item.file}" style="width:100%;">`;
        } else {
            content = `<p>File: ${item.name}</p>`;
        }

        container.innerHTML += `
            <div class="card" style="margin-top:10px;">
                <h3>${item.title}</h3>
                ${content}
                <button class="delete-btn" onclick="deleteLab(${index})">
                    Delete
                </button>
            </div>
        `;
    });
}

// delete function
function deleteLab(index) {
    if (confirm("Delete this lab?")) {
        let uploads = JSON.parse(localStorage.getItem("labUploads")) || [];

        uploads.splice(index, 1);

        localStorage.setItem("labUploads", JSON.stringify(uploads));

        displayUploads();
    }
}

window.onload = displayUploads;
</script>

</body>
</html>
